robot:
  humanoid_type: unitree/G1/29dof

  fitted_shape_dump_path: "assets/robots/${robot.humanoid_type}/fitted_smpl_shape.pkl"
  
  asset:
    smpl_dir: "assets/smpl"
    assetRoot: "./"
    assetFileName: "assets/robots/${robot.humanoid_type}/g1_29dof_rev_1_0.xml"
    training_mjcfName: "assets/robots/${robot.humanoid_type}/g1_29dof_rev_1_0.xml"

  extend_config:
    - joint_name: "head_link"
      parent_name: "torso_link"
      pos: [0.0, 0.0, 0.42]
      rot: [1.0, 0.0, 0.0, 0.0] # w x y z

  base_link: "torso_link"

  joint_matches:
    - ["pelvis", "Pelvis"]
    - ["left_hip_pitch_link", "L_Hip"]
    - ["left_knee_link", "L_Knee"]
    - ["left_ankle_roll_link", "L_Ankle"]
    - ["right_hip_pitch_link", "R_Hip"]
    - ["right_knee_link", "R_Knee"]
    - ["right_ankle_roll_link", "R_Ankle"]
    - ["left_shoulder_roll_link", "L_Shoulder"]
    - ["left_elbow_link", "L_Elbow"]
    - ["left_wrist_yaw_link", "L_Hand"]
    - ["right_shoulder_roll_link", "R_Shoulder"]
    - ["right_elbow_link", "R_Elbow"]
    - ["right_wrist_yaw_link", "R_Hand"]
    - ["head_link", "Head"]

  smpl_pose_modifier:
    - Pelvis: "[np.pi/2, 0, np.pi/2]"
    - L_Shoulder: "[0, 0, -np.pi/2]"
    - R_Shoulder: "[0, 0, np.pi/2]"
    - L_Elbow: "[0, -np.pi/2, 0]"
    - R_Elbow: "[0, np.pi/2, 0]"


video_dir: ${motion_pkl_root}/video_rendering
skip_frames: 3 # when skip frames=1, it means 30hz, when skip frames=2, it means 15hz, etc.
show_markers: False
max_workers: 12
