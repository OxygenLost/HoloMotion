# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: ppo
  - /robot: unitree/G1/23dof/23dof_training_v0_official_urdf_beyondmimic_pd
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_unitree_g1_23dof_ppo_teacher
  - /env/rewards: motion_tracking/rew_g1_23dof_stage1
  - /env/domain_randomization: NO_domain_rand
  - /env/terrain: plane

project_name: HoloMotion

motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_lafan1_23dof

algo:
  algo:
    config:
      entropy_coef: 5.0e-3
      module_dict:
        actor:
          type: MoEMLP
          predict_local_body_pos: ${algo.algo.config.predict_local_body_pos}
          pred_local_body_pos_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_local_body_vel: ${algo.algo.config.predict_local_body_vel}
          pred_local_body_vel_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_root_lin_vel: ${algo.algo.config.predict_root_lin_vel}
          fix_sigma: false
          use_layernorm: false
          input_dim:
            - actor_obs
          output_dim:
            - robot_action_dim
          layer_config:
            hidden_dims:
              - 2048
              - 2048
              - 1024
              - 512
            activation: SiLU
          max_sigma: 1.2
          min_sigma: 0.2
          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}
          num_fine_experts: 2
          num_shared_experts: 1
          top_k: 2
          load_balancing_loss_alpha: 0.01
          bound_loss_alpha: 10.0
          projection_dim: 2048
          hidden_dim: 1024

        critic:
          type: MoEMLP
          input_dim:
            - critic_obs
          output_dim:
            - 1
          layer_config:
            hidden_dims:
              - 2048
              - 2048
              - 1024
              - 512
            activation: SiLU
          num_fine_experts: 2
          num_shared_experts: 1
          top_k: 2
          load_balancing_loss_alpha: 0.01
          projection_dim: 2048
          hidden_dim: 1024

robot:
  motion:
    handpicked_motion_names: ["dance1_subject2_sliced-90-615_padded"]
