# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: ppo
  - /robot: unitree/G1/23dof/23dof_training_v0_official_urdf_beyondmimic_pd
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_unitree_g1_23dof_ppo_teacher
  - /env/rewards: motion_tracking/rew_g1_23dof_stage2
  - /env/domain_randomization: domain_rand_base
  - /env/terrain: rough

project_name: HoloMotion

# checkpoint: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250817_154355-train_unitree_g1_23dof_teacher_stage1_lafan1_beyondmimc/model_2000.pt
# checkpoint: /home/maiyue01.chen/project3/humanoid_locomotion/holomotion/logs/HoloMotion/20250821_133800-train_unitree_g1_23dof_teacher_stage2_lafan1_beyondmimc/model_1000.pt

motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_lafan1_23dof

env:
  config:
    termination:
      terminate_by_gravity: true
      terminate_by_low_height: true
      terminate_when_motion_far: true
    termination_scales:
      termination_motion_far_threshold: 0.6
      termination_min_base_height: 0.3
      termination_gravity_x: 0.7
      termination_gravity_y: 0.7
    noise_to_initial_level: 0
    init_noise_scale:
      dof_pos: 0.1
      dof_vel: 0.0
      root_pos: 0.05
      root_rot: 0.1
      root_vel: 0.5
      root_ang_vel: 0.5

rewards:
  reward_scales:
    termination: -100
    falldown: -200

algo:
  algo:
    config:
      entropy_coef: 1.0e-2
      normalize_rewards: false
      module_dict:
        actor:
          type: MLP
          input_dim:
            - actor_obs
          output_dim:
            - robot_action_dim
          layer_config:
            hidden_dims:
              - 2048
              - 1024
              - 512
            activation: SiLU
          max_sigma: 1.2
          min_sigma: 0.2
          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}

        critic:
          type: MLP
          input_dim:
            - critic_obs
          output_dim:
            - 1
          layer_config:
            hidden_dims:
              - 2048
              - 1024
              - 512
            activation: SiLU

robot:
  control:
    control_type: P
  motion:
    handpicked_motion_names: ["dance1_subject2_sliced-90-615_padded"]
