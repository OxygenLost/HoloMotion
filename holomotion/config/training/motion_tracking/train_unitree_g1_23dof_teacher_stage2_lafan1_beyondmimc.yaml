# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: ppo
  - /robot: unitree/G1/23dof/23dof_training_v0_official_urdf_beyondmimic_pd
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_unitree_g1_23dof_ppo_teacher
  - /env/rewards: motion_tracking/rew_g1_23dof_stage1
  - /env/domain_randomization: domain_rand_beyondmimic
  - /env/terrain: plane

project_name: HoloMotion

checkpoint: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250817_154355-train_unitree_g1_23dof_teacher_stage1_lafan1_beyondmimc/model_2000.pt

motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_lafan1_23dof

env:
  config:
    termination:
      terminate_by_gravity: true
      terminate_by_low_height: true
      terminate_when_motion_far: true
    termination_scales:
      termination_min_base_height: 0.25
      termination_gravity_x: 0.8
      termination_gravity_y: 0.8

rewards:
  reward_scales:
    l2_tracking_root_rpy: 3.0
    l2_rel_tracking_root_lin_vel: 4.0
    l2_rel_tracking_root_ang_vel: 2.0
    l2_root_rel_tracking_body_pos: 2.0
    l2_root_rel_tracking_body_rot: 2.0
    l2_root_rel_tracking_body_vel: 2.0
    penalty_action_rate: -1.0
    limits_dof_pos: -10.0

    l2_rel_tracking_keybody_pos: 0.0
    l2_tracking_joint_position: 0.0
    termination: 0.0
    penalty_action_smooth: 0.0
    penalty_power: 0.0
    penalty_torques: 0.0
    penalty_slippage: 0.0
    limits_dof_vel: 0.0
    limits_torque: 0.0
    l2_feet_vel: 0.0
    l2_root_rel_tracking_endpoints: 0.0
    l2_root_rel_tracking_body_ang_vel: 0.0
    l1_root_rel_tracking_torso_rot: 0.0
    l2_tracking_joint_velocity: 0.0

algo:
  algo:
    config:
      entropy_coef: 5.0e-3
      module_dict:
        actor:
          type: MoEMLP
          predict_local_body_pos: ${algo.algo.config.predict_local_body_pos}
          pred_local_body_pos_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_local_body_vel: ${algo.algo.config.predict_local_body_vel}
          pred_local_body_vel_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_root_lin_vel: ${algo.algo.config.predict_root_lin_vel}
          fix_sigma: false
          use_layernorm: false
          input_dim:
            - actor_obs
          output_dim:
            - robot_action_dim
          layer_config:
            hidden_dims:
              - 2048
              - 2048
              - 1024
              - 512
            activation: SiLU
          max_sigma: 1.2
          min_sigma: 0.2
          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}
          num_fine_experts: 2
          num_shared_experts: 1
          top_k: 2
          load_balancing_loss_alpha: 0.01
          bound_loss_alpha: 10.0
          projection_dim: 2048
          hidden_dim: 1024

        critic:
          type: MoEMLP
          input_dim:
            - critic_obs
          output_dim:
            - 1
          layer_config:
            hidden_dims:
              - 2048
              - 2048
              - 1024
              - 512
            activation: SiLU
          num_fine_experts: 2
          num_shared_experts: 1
          top_k: 2
          load_balancing_loss_alpha: 0.01
          projection_dim: 2048
          hidden_dim: 1024

robot:
  motion:
    handpicked_motion_names: ["dance1_subject2_sliced-90-615_padded"]
