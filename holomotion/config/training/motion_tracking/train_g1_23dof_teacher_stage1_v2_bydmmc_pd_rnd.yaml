# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: ppo_v2
  - /robot: unitree/G1/23dof/23dof_training_v1
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_unitree_g1_23dof_ppo_teacher_v2
  - /env/rewards: motion_tracking/rew_g1_23dof_stage1_v2
  - /env/domain_randomization: NO_domain_rand
  - /env/terrain: plane

project_name: HoloMotion

# checkpoint: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotionMoTrack/20250731_000211-exp_holomotion_g1_23dof_v27_phc_dr_ft_rew_v7+project-4090-robot-lab-bcloud-bj+20250730235755+exp_holomotion_g1_23dof_v27_phc_dr_ft_rew_v7+nenv_2048x1x8-motion_tracking-g1_23dof_lockwrist/model_240000.pt

motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_lafan1_23dof

algo:
  algo:
    config:
      normalize_rewards: false
      log_interval: 50
      save_interval: 1000

      use_rnd: true
      load_rnd: true
      rnd_rew_coef: 1.0
      rnd_loss_coef: 1.0
      rnd_learning_rate: 1.0e-04
      rnd_reward_norm: true

env:
  config:
    termination:
      terminate_when_ee_z_far: true
      terminate_by_gravity: false
      terminate_by_low_height: false
      terminate_when_motion_far: false
    termination_scales:
      terminate_when_ee_z_far_threshold: 0.40
      termination_min_base_height: 0.30
      termination_gravity_x: 0.7
      termination_gravity_y: 0.7

    noise_to_initial_level: 1
    init_noise_scale:
      dof_pos: 0.1
      dof_vel: 0.0
      root_pos: 0.05
      root_rot: 0.1
      root_vel: 0.5
      root_ang_vel: 0.5

robot:
  control:
    stiffness: ${pd_params.BeyondMimic.stiffness}
    damping: ${pd_params.BeyondMimic.damping}
