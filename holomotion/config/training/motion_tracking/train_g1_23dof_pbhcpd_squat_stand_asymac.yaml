# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: ppo_v3
  - /robot: unitree/G1/23dof/23dof_training_v1
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_unitree_g1_23dof_ppo_asymac
  - /env/rewards: motion_tracking/rew_g1_23dof_stage1_v6
  - /env/domain_randomization: domain_rand_base
  - /env/terrain: plane

project_name: HoloMotion

# checkpoint: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250815_030331-train_unitree_g1_23dof_teacher_stage2_robodance100_ft_pbhc_pd/model_233000.pt

motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_23dof_0823retargeting_processed_stand_squat
# motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_23dof_0825retargeting_normed

algo:
  algo:
    config:
      entropy_coef: 1.0e-3
      desired_kl: 0.01
      init_noise_std: 0.5
      use_td_ucb_curriculum: false
      # --- Module Settings ---
      module_dict:
        actor:
          type: MLP
          input_dim:
            - actor_obs
          output_dim:
            - robot_action_dim
          predict_local_body_pos: false
          predict_local_body_vel: false
          predict_root_lin_vel: false
          layer_config:
            hidden_dims:
              - 512
              - 256
              - 128
            activation: SiLU
            use_layernorm: false

          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}

        critic:
          type: MLP
          input_dim:
            - critic_obs
          output_dim:
            - 1
          predict_local_body_pos: false
          predict_local_body_vel: false
          predict_root_lin_vel: false
          layer_config:
            hidden_dims:
              - 512
              - 256
              - 128
            activation: SiLU
            use_layernorm: false

robot:
  asset:
    self_collisions: 1

  init_state:
    default_joint_angles:
      left_hip_pitch_joint: -0.1
      left_hip_roll_joint: 0.0
      left_hip_yaw_joint: 0.0
      left_knee_joint: 0.3
      left_ankle_pitch_joint: -0.2
      left_ankle_roll_joint: 0.0

      right_hip_pitch_joint: -0.1
      right_hip_roll_joint: 0.0
      right_hip_yaw_joint: 0.0
      right_knee_joint: 0.3
      right_ankle_pitch_joint: -0.2
      right_ankle_roll_joint: 0.0

      waist_yaw_joint: 0.
      waist_roll_joint: 0.
      waist_pitch_joint: 0.

      left_shoulder_pitch_joint: 0.2
      left_shoulder_roll_joint: 0.2
      left_shoulder_yaw_joint: 0.0
      left_elbow_joint: 0.9

      right_shoulder_pitch_joint: 0.2
      right_shoulder_roll_joint: -0.2
      right_shoulder_yaw_joint: 0.0
      right_elbow_joint: 0.9

  control:
    control_type: P
    stiffness:
      hip_yaw: 100
      hip_roll: 100
      hip_pitch: 100
      knee: 150
      ankle_pitch: 40
      ankle_roll: 40
      waist_yaw: 400
      waist_roll: 400
      waist_pitch: 400
      shoulder_pitch: 100
      shoulder_roll: 100
      shoulder_yaw: 50
      elbow: 50
    damping:
      hip_yaw: 2.0
      hip_roll: 2.0
      hip_pitch: 2.0
      knee: 4.0
      ankle_pitch: 2.0
      ankle_roll: 2.0
      waist_yaw: 5.0
      waist_roll: 5.0
      waist_pitch: 5.0
      shoulder_pitch: 2.0
      shoulder_roll: 2.0
      shoulder_yaw: 2.0
      elbow: 2.0
