# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: dagger_mlp
  - /robot: unitree/G1/23dof/23dof_training_v1
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_bydmimic_pd_student_v0
  - /env/rewards: motion_tracking/rew_g1_23dof_stage2
  - /env/domain_randomization: domain_rand_base
  - /env/terrain: rough

project_name: HoloMotion

checkpoint: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250901_114504-train_g1_23dof_student_robodance100_dagger_mlp_bydmimic_pd/model_20000.pt

motion_lmdb_path: /horizon-bucket/robot_lab/users/bo07.zhang/lmdbs/lmdb_g1_23dof_douyin0830_gvhmr_btws_pad

algo:
  algo:
    config:
      num_steps_per_env: 12
      num_learning_epochs: 3
      # teacher_actor_ckpt_path: /home/maiyue01.chen/project3/humanoid_locomotion/holomotion/logs/HoloMotion/20250831_110536-train_g1_23dof_teacher_stage1_v5_vae_tdcu_rd100_dr/model_12000.pt
      teacher_actor_ckpt_path: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250831_110536-train_g1_23dof_teacher_stage1_v5_vae_tdcu_rd100_dr/model_20000.pt
      use_teacher_rollout_annealing: true

      module_dict:
        teacher_actor:
          type: MoEMLPVAE
          predict_local_body_pos: ${algo.algo.config.predict_local_body_pos}
          pred_local_body_pos_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_local_body_vel: ${algo.algo.config.predict_local_body_vel}
          pred_local_body_vel_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_root_lin_vel: ${algo.algo.config.predict_root_lin_vel}
          fix_sigma: false
          use_layernorm: false
          input_dim:
            - teacher_actor_obs
          output_dim:
            - robot_action_dim
          max_sigma: 1.2
          min_sigma: 0.2
          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}
          num_fine_experts: 10
          num_shared_experts: 1
          top_k: 4
          load_balancing_loss_alpha: 0.01
          vae_latent_dim: 128
          kl_loss_scale: 1.0e-8
          bound_loss_alpha: 10.0
          projection_dim: 1024
          hidden_dim: 1024