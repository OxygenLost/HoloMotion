# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: dagger_mlp
  - /robot: unitree/G1/23dof/23dof_training_v1
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_vae_distill
  - /env/rewards: motion_tracking/rew_g1_23dof_stage2
  - /env/domain_randomization: NO_domain_rand
  - /env/terrain: plane

project_name: HoloMotion

# checkpoint: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250821_101904-train_g1_23dof_student_salsa_dagger_mlp_ft/model_29000.pt

motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_robodance100_no_global_translation

algo:
  algo:
    config:
      num_steps_per_env: 24
      log_interval: 50
      save_interval: 500
      teacher_actor_ckpt_path: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250828_212135-train_g1_23dof_teacher_stage1_v5_vae_tdcu_rd100/model_14000.pt
      # teacher_actor_ckpt_path: /home/maiyue01.chen/project3/humanoid_locomotion/holomotion/logs/HoloMotion/20250828_212135-train_g1_23dof_teacher_stage1_v5_vae_tdcu_rd100/model_13000.pt
      use_teacher_rollout_annealing: true
      module_dict:
        actor:
          type: MoEMLP
          predict_local_body_pos: ${algo.algo.config.predict_local_body_pos}
          pred_local_body_pos_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_local_body_vel: ${algo.algo.config.predict_local_body_vel}
          pred_local_body_vel_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_root_lin_vel: ${algo.algo.config.predict_root_lin_vel}
          fix_sigma: false
          use_layernorm: false
          input_dim:
            - actor_obs
          output_dim:
            - robot_action_dim
          layer_config:
            type: MLP
            hidden_dims:
              - 2048
              - 2048
              - 1024
              - 512
            activation: SiLU
          max_sigma: 1.2
          min_sigma: 0.2
          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}
          num_fine_experts: 5
          num_shared_experts: 1
          top_k: 2
          load_balancing_loss_alpha: 0.01
          bound_loss_alpha: 10.0
          projection_dim: 2048
          hidden_dim: 1024

        teacher_actor:
          type: MoEMLPVAE
          predict_local_body_pos: ${algo.algo.config.predict_local_body_pos}
          pred_local_body_pos_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_local_body_vel: ${algo.algo.config.predict_local_body_vel}
          pred_local_body_vel_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_root_lin_vel: ${algo.algo.config.predict_root_lin_vel}
          fix_sigma: false
          use_layernorm: false
          input_dim:
            - teacher_obs
          output_dim:
            - robot_action_dim
          max_sigma: 1.2
          min_sigma: 0.2
          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}
          num_fine_experts: 10
          num_shared_experts: 1
          top_k: 4
          load_balancing_loss_alpha: 0.01
          vae_latent_dim: 128
          kl_loss_scale: 1.0e-8
          bound_loss_alpha: 10.0
          projection_dim: 1024
          hidden_dim: 1024

robot:
  control:
    control_type: P
    stiffness: ${pd_params.BeyondMimic.stiffness}
    damping: ${pd_params.BeyondMimic.damping}
