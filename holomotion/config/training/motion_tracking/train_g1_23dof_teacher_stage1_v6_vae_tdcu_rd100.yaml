# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: ppo
  - /robot: unitree/G1/23dof/23dof_training_v1
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_unitree_g1_23dof_ppo_teacher_v6
  - /env/rewards: motion_tracking/rew_g1_23dof_stage1_v6
  - /env/domain_randomization: NO_domain_rand
  - /env/terrain: plane
  # - /data_curation: holomotion_full_filtered

project_name: HoloMotion

# checkpoint: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250829_154510-train_g1_23dof_teacher_stage1_v6_vae_tdcu_fulldata/model_8000.pt

# motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_holomotion_fulldata_g1_23dof
# motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_lafan1_23dof
motion_lmdb_path: /horizon-bucket/robot_lab/users/bo07.zhang/lmdbs/lmdb_g1_23dof_douyin0830_gvhmr_btws_pad


algo:
  algo:
    config:
      normalize_rewards: false
      log_interval: 50
      save_interval: 1000
      vae_loss_alpha: 1.0

      use_ucb_curriculum: true
      ucb_confidence_param: 1.0
      use_td_error_motion_scoring: true
      td_error_score_scale: 1.0
      td_error_score_momentum: 0.9

      module_dict:
        actor:
          type: MoEMLPVAE
          predict_local_body_pos: ${algo.algo.config.predict_local_body_pos}
          pred_local_body_pos_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_local_body_vel: ${algo.algo.config.predict_local_body_vel}
          pred_local_body_vel_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_root_lin_vel: ${algo.algo.config.predict_root_lin_vel}
          fix_sigma: false
          use_layernorm: false
          input_dim:
            - actor_obs
          output_dim:
            - robot_action_dim
          max_sigma: 1.2
          min_sigma: 0.2
          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}
          num_fine_experts: 10
          num_shared_experts: 1
          top_k: 4
          load_balancing_loss_alpha: 0.01
          vae_latent_dim: 128
          kl_loss_scale: 1.0e-8
          bound_loss_alpha: 10.0
          projection_dim: 1024
          hidden_dim: 1024

        critic:
          type: MoEMLPVAE
          fix_sigma: false
          use_layernorm: false
          input_dim:
            - critic_obs
          output_dim:
            - 1
          max_sigma: 1.2
          min_sigma: 0.2
          num_fine_experts: 10
          num_shared_experts: 1
          top_k: 4
          load_balancing_loss_alpha: 0.01
          vae_latent_dim: 128
          kl_loss_scale: 1.0e-8
          bound_loss_alpha: 10.0
          projection_dim: 1024
          hidden_dim: 1024

        disc: {}
        rnd: {}

env:
  config:
    resample_motion_when_training: True
    resample_time_interval_s: 20

robot:
  control:
    stiffness: ${pd_params.BeyondMimic.stiffness}
    damping: ${pd_params.BeyondMimic.damping}

  motion:
    num_envs: ${num_envs}
    motion_log_dir: ${experiment_save_dir}/motion_log
    max_frame_length: 500
    min_frame_length: 0
    use_weighted_sampling: true
    sampling_strategy: softmax # Options: softmax, direct_ucb
    softmax_temperature: 1.0 # Controls sampling sharpness for softmax
    use_sub_motion_indexing: true
    sub_motion_overlap_frames: 50
    dump_sampling_info: true
    enable_curriculum_sync: true
    curriculum_sync_interval: 50
    # excluded_motion_names: ${data_curation.excluded_motion_keys}
