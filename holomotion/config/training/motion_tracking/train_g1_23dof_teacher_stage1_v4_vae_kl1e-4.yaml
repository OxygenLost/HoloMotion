# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: ppo
  - /robot: unitree/G1/23dof/23dof_training_v1
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_unitree_g1_23dof_ppo_teacher_v3
  - /env/rewards: motion_tracking/rew_g1_23dof_stage1_v3
  - /env/domain_randomization: NO_domain_rand
  - /env/terrain: plane

project_name: HoloMotion

# checkpoint: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotionMoTrack/20250731_000211-exp_holomotion_g1_23dof_v27_phc_dr_ft_rew_v7+project-4090-robot-lab-bcloud-bj+20250730235755+exp_holomotion_g1_23dof_v27_phc_dr_ft_rew_v7+nenv_2048x1x8-motion_tracking-g1_23dof_lockwrist/model_240000.pt

motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_lafan1_23dof

algo:
  algo:
    config:
      normalize_rewards: false
      log_interval: 50
      save_interval: 1000
      vae_loss_alpha: 1.0

      module_dict:
        actor:
          type: MoEMLPVAE
          predict_local_body_pos: ${algo.algo.config.predict_local_body_pos}
          pred_local_body_pos_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_local_body_vel: ${algo.algo.config.predict_local_body_vel}
          pred_local_body_vel_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_root_lin_vel: ${algo.algo.config.predict_root_lin_vel}
          fix_sigma: false
          use_layernorm: false
          input_dim:
            - actor_obs
          output_dim:
            - robot_action_dim
          max_sigma: 1.2
          min_sigma: 0.2
          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}
          num_fine_experts: 8
          num_shared_experts: 1
          top_k: 4
          load_balancing_loss_alpha: 0.01
          vae_latent_dim: 128
          kl_loss_scale: 1.0e-4
          bound_loss_alpha: 10.0
          projection_dim: 1024
          hidden_dim: 1024

        critic:
          type: MoEMLPVAE
          input_dim:
            - critic_obs
          output_dim:
            - 1
          num_fine_experts: 8
          num_shared_experts: 1
          top_k: 4
          load_balancing_loss_alpha: 0.01
          vae_latent_dim: 128
          kl_loss_scale: 1.0e-4
          projection_dim: 1024
          hidden_dim: 1024

        disc: {}
        rnd: {}

env:
  config:
    termination:
      terminate_when_ee_z_far: true
      terminate_by_gravity: true
      terminate_by_low_height: true
      terminate_when_motion_far: false
    termination_scales:
      terminate_when_ee_z_far_threshold: 0.30
      termination_min_base_height: 0.30
      termination_gravity_x: 0.7
      termination_gravity_y: 0.7

    noise_to_initial_level: 1
    init_noise_scale:
      dof_pos: 0.1
      dof_vel: 0.0
      root_pos: 0.05
      root_rot: 0.1
      root_vel: 0.5
      root_ang_vel: 0.5

robot:
  control:
    stiffness: ${pd_params.BeyondMimic.stiffness}
    damping: ${pd_params.BeyondMimic.damping}
