# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: dagger_mlp
  - /robot: unitree/G1/23dof/23dof_training_v0_official_urdf_beyondmimic_pd
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_unitree_g1_23dof_ppo_student_beyondmimic_teacher
  - /env/rewards: motion_tracking/rew_g1_23dof_stage2
  - /env/domain_randomization: domain_rand_beyondmimic
  - /env/terrain: plane

project_name: HoloMotion

# checkpoint: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250815_192011-train_unitree_g1_23dof_student_robodance100_dagger_cs_mlp/model_23000.pt

motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_lafan1_23dof

robot:
  motion:
    handpicked_motion_names: ["dance1_subject2_sliced-90-615_padded"]

algo:
  algo:
    config:
      num_steps_per_env: 24
      teacher_actor_ckpt_path: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250821_120045-train_g1_23dof_beyondmimic/model_132000.pt
      # teacher_actor_ckpt_path: /home/maiyue01.chen/project3/humanoid_locomotion/holomotion/logs/HoloMotion/20250821_120045-train_g1_23dof_beyondmimic/model_104000.pt
      use_teacher_rollout_annealing: true

      module_dict:
        actor:
          type: MLP
          fix_sigma: true
          input_dim:
            - actor_obs
          output_dim:
            - robot_action_dim
          predict_local_body_pos: false
          predict_local_body_vel: false
          predict_root_lin_vel: false
          layer_config:
            hidden_dims:
              - 2048
              - 1024
              - 512
            activation: SiLU
            use_layernorm: false
        teacher_actor:
          type: MLP
          input_dim:
            - teacher_actor_obs
          output_dim:
            - robot_action_dim
          layer_config:
            hidden_dims:
              - 2048
              - 1024
              - 512
            activation: SiLU
          max_sigma: 1.2
          min_sigma: 0.2
          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}

env:
  config:
    termination:
      terminate_by_gravity: true
      terminate_by_low_height: true
      terminate_when_ee_z_far: true
      terminate_when_motion_far: false
    termination_scales:
      terminate_when_ee_z_far_threshold: 0.30
      termination_min_base_height: 0.30
      termination_gravity_x: 0.7
      termination_gravity_y: 0.7

    noise_to_initial_level: 1
    init_noise_scale:
      dof_pos: 0.1
      dof_vel: 0.0
      root_pos: 0.05
      root_rot: 0.1
      root_vel: 0.5
      root_ang_vel: 0.5
