# @package _global_

defaults:
  - /training: train_base
  - /simulator: isaacgym
  - /algo: ppo
  - /robot: unitree/G1/23dof/23dof_training_v1
  - /env: motion_tracking
  - /env/observations: motion_tracking/obs_unitree_g1_23dof_ppo_teacher_v5
  - /env/rewards: motion_tracking/rew_g1_23dof_stage1_v6
  - /env/domain_randomization: domain_rand_v2
  - /env/terrain: rough

project_name: HoloMotion

checkpoint: /horizon-bucket/robot_lab/users/maiyue01.chen/expr_output/HoloMotion/HoloMotion/20250904_163753-train_g1_23dof_teacher_stage1_rd100_holo_v2_nocu/model_4000.pt
# motion_lmdb_path: /horizon-bucket/robot_lab/users/maiyue01.chen/lmdbs/lmdb_robodance100_no_global_translation
motion_lmdb_path: /horizon-bucket/robot_lab/users/bo07.zhang/lmdbs/lmdb_g1_23dof_douyin0830_gvhmr_btws_pad_mpjpe266500_600

algo:
  algo:
    config:
      normalize_rewards: false
      log_interval: 50
      save_interval: 1000
      vae_loss_alpha: 1.0

      use_td_ucb_curriculum: false

      module_dict:
        actor:
          type: MoEMLPVAE
          predict_local_body_pos: ${algo.algo.config.predict_local_body_pos}
          pred_local_body_pos_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_local_body_vel: ${algo.algo.config.predict_local_body_vel}
          pred_local_body_vel_dim:
            ${eval:'(${algo.algo.config.num_rigid_bodies} + ${algo.algo.config.num_extended_bodies})
            * 3'}
          predict_root_lin_vel: ${algo.algo.config.predict_root_lin_vel}
          fix_sigma: false
          use_layernorm: false
          input_dim:
            - actor_obs
          output_dim:
            - robot_action_dim
          max_sigma: 1.2
          min_sigma: 0.2
          clamp_output:
            enabled: true
            raw_lower_bound: ${robot.dof_pos_lower_limit_list}
            raw_upper_bound: ${robot.dof_pos_upper_limit_list}
            action_scale: ${robot.control.action_scale}
            default_dof_pos_dict: ${robot.init_state.default_joint_angles}
            dof_order: ${robot.dof_names}
          num_fine_experts: 10
          num_shared_experts: 1
          top_k: 3
          load_balancing_loss_alpha: 0.01
          vae_latent_dim: 32
          kl_loss_scale: 1.0e-6
          bound_loss_alpha: 10.0
          projection_dim: 1024
          hidden_dim: 1024

        critic:
          type: MoEMLPVAE
          fix_sigma: false
          use_layernorm: false
          input_dim:
            - critic_obs
          output_dim:
            - 1
          max_sigma: 1.2
          min_sigma: 0.2
          num_fine_experts: 10
          num_shared_experts: 1
          top_k: 3
          load_balancing_loss_alpha: 0.01
          vae_latent_dim: 32
          kl_loss_scale: 1.0e-6
          bound_loss_alpha: 10.0
          projection_dim: 1024
          hidden_dim: 1024

        disc: {}
        rnd: {}

env:
  config:
    terminate_by_low_height: true
    terminate_by_gravity: true
    terminate_when_motion_end: true
    terminate_when_motion_far: false

    resample_motion_when_training: True
    resample_time_interval_s: 5

robot:
  init_state:
    default_joint_angles: ${default_poses.HoloMotionV2}
  control:
    stiffness: ${pd_params.HoloMotionV2.stiffness}
    damping: ${pd_params.HoloMotionV2.damping}

  motion:
    use_sub_motion_indexing: true
    sub_motion_overlap_frames: 50
    num_envs: ${num_envs}
    motion_log_dir: ${experiment_save_dir}/motion_log
    max_frame_length: 500
    min_frame_length: 0
    use_weighted_sampling: false
    sampling_strategy: softmax # Options: softmax, direct_ucb
    softmax_temperature: 1.0 # Controls sampling sharpness for softmax
    dump_sampling_info: false
    enable_curriculum_sync: false
    curriculum_sync_interval: 50
    # excluded_motion_names: ${data_curation.excluded_motion_keys}
