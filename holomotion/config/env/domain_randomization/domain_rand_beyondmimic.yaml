# @package _global_

defaults:
  - domain_rand_base

domain_rand:
  push_robots: true
  push_interval_s: [1, 3]
  max_push_vel_xy: 0.5

  randomize_friction: true
  friction_range: [0.3, 1.6]

  randomize_base_com: true
  base_com_range:
    x: [-0.025, 0.025]
    y: [-0.05, 0.05]
    z: [-0.05, 0.05]

  randomize_joint_default_pos: true
  joint_default_pos_range: [-0.01, 0.01]

  randomize_base_mass: False
  randomize_link_mass: False
  randomize_pd_gain: False
  randomize_torque_rfi: False
  randomize_ctrl_delay: False
