# @package _global_

rewards:
  motion_global_anchor_position_error_exp:
    weight: 0.5
    params:
      std: 0.3

  motion_global_anchor_orientation_error_exp:
    weight: 0.5
    params:
      std: 0.4

  motion_relative_body_position_error_exp:
    weight: 1.0
    params:
      keybody_names: ${robot.key_bodies}
      std: 0.3

  motion_relative_body_orientation_error_exp:
    weight: 1.0
    params:
      keybody_names: ${robot.key_bodies}
      std: 0.4

  motion_global_body_linear_velocity_error_exp:
    weight: 1.0
    params:
      keybody_names: ${robot.key_bodies}
      std: 1.0

  motion_global_body_angular_velocity_error_exp:
    weight: 1.0
    params:
      keybody_names: ${robot.key_bodies}
      std: 3.14

  action_rate_l2:
    weight: -0.1
    params: {}

  joint_pos_limits:
    weight: -10.0
    params:
      asset_cfg:
        _target_: isaaclab.managers.scene_entity_cfg.SceneEntityCfg
        name: robot
        joint_names:
          - ".*"

  undesired_contacts:
    weight: -0.1
    params:
      threshold: 1.0
      sensor_cfg:
        _target_: isaaclab.managers.scene_entity_cfg.SceneEntityCfg
        name: contact_forces
        body_names:
          - ${robot.undesired_contacts_regrex}
