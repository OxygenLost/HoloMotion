# @package _global_

# Be careful when using _raw, history
obs:
  context_length: 0
  n_fut_frames: 1
  target_fps: 50

  obs_groups:
    actor_obs:
      atomic_obs_list:
        - ref_motion_states: {}
        - global_anchor_diff: {}
        - rel_robot_root_lin_vel:
            noise:
              type: AdditiveUniformNoiseCfg
              params:
                n_min: -0.5
                n_max: 0.5
        - rel_robot_root_ang_vel:
            noise:
              type: AdditiveUniformNoiseCfg
              params:
                n_min: -0.2
                n_max: 0.2
        - dof_pos:
            noise:
              type: AdditiveUniformNoiseCfg
              params:
                n_min: -0.01
                n_max: 0.01
        - dof_vel:
            noise:
              type: AdditiveUniformNoiseCfg
              params:
                n_min: -0.5
                n_max: 0.5
        - last_action: {}
      enable_corruption: true
      concatenate_terms: true

    critic_obs:
      atomic_obs_list:
        - ref_motion_states: {}
        - global_anchor_diff: {}
        - rel_robot_root_lin_vel: {}
        - rel_robot_root_ang_vel: {}
        - root_rel_robot_bodylink_pos_flat: {}
        - root_rel_robot_bodylink_rot_mat_flat: {}
        - dof_pos: {}
        - dof_vel: {}
        - last_action: {}
      enable_corruption: false
      concatenate_terms: true

  obs_dict:
    actor_obs:
      - dummy_isaaclab_obs

    critic_obs:
      - dummy_isaaclab_obs_critic

  obs_auxiliary: {}

  serialization_schema:
    - obs_name: flattened_obs
      seq_len: 1
      feat_dim: 160

  critic_serialization_schema:
    - obs_name: flattened_obs
      seq_len: 1
      feat_dim: 448

  obs_scales:
    dummy_isaaclab_obs: 1.0
    dummy_isaaclab_obs_critic: 1.0

  noise_scales:
    dummy_isaaclab_obs: 0.0
    dummy_isaaclab_obs_critic: 0.0

  obs_dims:
    - dummy_isaaclab_obs: ${eval:'${obs.serialization_schema[0].feat_dim} * ${obs.serialization_schema[0].seq_len}'}
    - dummy_isaaclab_obs_critic: ${eval:'${obs.critic_serialization_schema[0].feat_dim} * ${obs.critic_serialization_schema[0].seq_len}'}
